name: Publish to PyPI & GitHub Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # for creating GitHub Release
      id-token: write      # for PyPI trusted publishing (OIDC)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build tools
        run: pip install build twine

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify tag matches __version__.py
        run: |
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          CODE_VERSION=$(python -c "from PFlowC.__version__ import __version__; print(__version__)")
          if [ "$TAG_VERSION" != "$CODE_VERSION" ]; then
            echo "ERROR: Tag version (v$TAG_VERSION) does not match __version__.py ($CODE_VERSION)"
            exit 1
          fi
          echo "Version $TAG_VERSION verified ✓"

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag, fall back to initial commit if none
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
            echo "## 🚀 Initial Release v${{ steps.version.outputs.VERSION }}" >> $GITHUB_OUTPUT
            git log --oneline --no-merges | sed 's/^/- /' >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
            echo "## Changes since $PREV_TAG" >> $GITHUB_OUTPUT
            git log --oneline --no-merges ${PREV_TAG}..HEAD | sed 's/^/- /' >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          files: dist/*
          generate_release_notes: true
